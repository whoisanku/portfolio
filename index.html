  <meta name="theme-color" content="#f6f7f9" />
  <script>
    // Stamp the theme before first paint so there is no flash of the wrong
    // scheme: stored preference wins, else the OS scheme. src/lib/theme.ts
    // owns every later change.
    (function () {
      var stored = null;
      try { stored = localStorage.getItem("theme"); } catch (e) { /* privacy mode */ }
      var dark = stored === "dark" || (stored !== "light" &&
        window.matchMedia("(prefers-color-scheme: dark)").matches);
      document.documentElement.setAttribute("data-theme", dark ? "dark" : "light");
      var meta = document.querySelector('meta[name="theme-color"]');
      if (meta) meta.setAttribute("content", dark ? "#101216" : "#f6f7f9");
    })();
  </script>
  <title>Ankit Bhandari</title>
